steps:
  # Step 1: Ensure Artifact Registry Docker repository exists (pre-step)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gcloud artifacts repositories create crm-repo --repository-format=docker --location=europe-west1 --description="CRM Docker repository" --quiet 2>/dev/null || true'

  # Step 2: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/crm-repo/liberty-crm:$COMMIT_SHA', '.']

  # Step 3: Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/crm-repo/liberty-crm:$COMMIT_SHA']

  # Step 4: Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'liberty-crm'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/crm-repo/liberty-crm:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/crm-repo/liberty-crm:$COMMIT_SHA'
